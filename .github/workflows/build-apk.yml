name: Build ZyCrypto APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          echo "sdk.dir=$ANDROID_HOME" > apk/local.properties

      - name: Build APK
        working-directory: apk
        run: gradle assembleDebug --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZyCrypto-APK
          path: apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ZyCrypto APK"
          body: "APK auto-build. Android: telecharge ZyCrypto.apk ci-dessous."
          files: apk/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
